{% extends "base.html" %}

{% block content %}
<main class="single">
    <article>
        <h1 class="nomint single-title">{{ page.title }}</h1>
        <p class="subtitle">Created {{ page.date }}</p>
        {{ page.content | replace(from='src="~/', to='src="' ~ get_env(name="BASE_PATH", default="") ~ '/') | safe }}
    </article>
    <p class="license">
        This work is licensed under a
        <a
            href="https://creativecommons.org/publicdomain/zero/1.0/"
            rel="license"
            >Creative Commons Zero</a
        >
        license
    </p>
</main>
{% endblock content %}
