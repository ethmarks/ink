{% extends "base.html" %}

{% block content %}
<main>
    <article>
        <h1 class="nomint single-title">{{ page.title }}</h1>
        <p class="subtitle">Created {{ page.date }}</p>
        {{ page.content | replace(from='src="~/', to='src="' ~ get_env(name="BASE_PATH", default="") ~ '/') | safe }}
    </article>
</main>
{% endblock content %}
