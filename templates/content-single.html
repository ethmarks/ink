{% extends "base.html" %}

{% block content %}
<main class="single">
    <article class="animated">
        <h1 class="nomint single-title">{{ page.title }}</h1>
        <p class="subtitle">Created {{ page.date }}</p>
        {{ page.content | replace(from='src="~/', to='src="' ~ get_env(name="BASE_PATH", default="") ~ '/') | safe }}
    </article>
    <p class="license animated">
        This work is dedicated
        <span class="desktop-only">to the public domain</span> under
        <a
            href="https://creativecommons.org/publicdomain/zero/1.0/"
            rel="license"
            >CC0</a
        >
    </p>
</main>
{% endblock content %}
